[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
ffi = false

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "solady/=lib/solady/src/",
    "forge-std/=lib/forge-std/src/",
    "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 1000
depth = 100
fail_on_revert = false

# Faster local iteration: same tests, fewer randomized runs.
[profile.lite.fuzz]
runs = 64

[profile.lite.invariant]
runs = 16
depth = 32

# Pre-merge depth, used by the CI deep job.
[profile.deep.fuzz]
runs = 10000

[profile.deep.invariant]
runs = 5000
depth = 200

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "preserve"
